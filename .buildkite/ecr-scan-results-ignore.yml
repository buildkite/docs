    reason: libcap2 2.66-4+deb12u2. No fix available for Bookworm.
    until: 2026-07-13
  - id: CVE-2026-5704
    reason: tar 1.34+dfsg-1.2+deb12u1. No fix available for Bookworm.
    until: 2026-07-13
