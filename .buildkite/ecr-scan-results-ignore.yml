ignores:
  # --- Permanent ignores (no Bookworm fix expected) ---
  - id: CVE-2023-50495
    reason: ncurses 6.4-4 segfault in _nc_wrap_entry(). Fix only in Trixie (6.5+), no DSA for Bookworm. Minor issue, not remotely exploitable.
  - id: CVE-2025-69720
    reason: ncurses 6.4-4. Not exploitable in this containerized Rails app — ncurses is not exposed to untrusted terminal input. Waiting for Debian Bookworm upstream fix.

  # --- Perl CVEs (no fix in any Debian release) ---
  - id: CVE-2026-12087
    reason: perl 5.36.0-7+deb12u3. Heap OOB read in Socket.xs pack_ip_mreq_source() — requires calling multicast socket functions with short source args. This Rails app does not use perl or its Socket module. No fix in any Debian release.
    until: 2026-10-03
  - id: CVE-2026-48962
    reason: perl 5.36.0-7+deb12u3. Arbitrary code exec via IO::Compress File::GlobMapper — requires attacker-controlled output glob. App does not invoke perl IO::Compress. No fix in any Debian release.
    until: 2026-10-03
  - id: CVE-2026-48959
    reason: perl 5.36.0-7+deb12u3. CPU exhaustion in IO::Uncompress::Unzip fastForward — requires processing attacker-supplied zip files via perl. App does not do this. No fix in any Debian release.
    until: 2026-10-03
  - id: CVE-2026-48961
    reason: perl 5.36.0-7+deb12u3. Crash in zipdetails CLI tool due to misnamed subroutine. Bundled CLI tool only, not a library issue. Never invoked by this app. No fix in any Debian release.
    until: 2026-10-03

  # --- attr/acl CVEs (local privilege escalation, not applicable in container context) ---
  - id: CVE-2026-54371
    reason: attr 2.5.1-4. Symlink traversal in getfattr/setfattr — requires local attacker controlling path components during privileged invocation. Not applicable in this container context. No fix available for Bookworm.
    until: 2026-10-03
  - id: CVE-2026-54370
    reason: acl 2.3.1-3. TOCTOU race in getfacl/setfacl/chacl — requires local attacker controlling path components during privileged invocation. Not applicable in this container context. No fix available for Bookworm.
    until: 2026-10-03
  - id: CVE-2026-54369
    reason: acl 2.3.1-3. Symlink traversal in libacl pathname-based functions — requires local attacker controlling path components during privileged caller. Not applicable in this container context. No fix available for Bookworm.
    until: 2026-10-03

  # --- Other (existing, expiring soon) ---
