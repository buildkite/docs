# docs-draft-step.yml — The main step definition for the docs draft pipeline.
# Uploaded dynamically by docs-draft-setup.sh.

steps:
  - label: ":memo: Draft documentation"
    command: bash .buildkite/scripts/docs-draft.sh
    timeout_in_minutes: 10
    agents:
      queue: hosted
    env:
      AWS_DEFAULT_REGION: us-east-1
    plugins:
      - aws-assume-role-with-web-identity#v1.5.0:
          role-arn: arn:aws:iam::445615400570:role/pipeline-buildkite-docs-draft-writer
          session-tags:
            - organization_slug
            - organization_id
            - pipeline_slug
            - build_branch
      - aws-ssm#v1.1.0:
          parameters:
            GITHUB_TOKEN: /pipelines/buildkite/docs-draft-writer/github-token
      - docker#v5.13.0:
          image: "node:22-slim"
          propagate-environment: true
          volumes:
            - "/gitmirror:/gitmirror:ro"
          environment:
            - "BUILDKITE_AGENT_ACCESS_TOKEN"
            - "BUILDKITE_AGENT_ENDPOINT"
            - "UPSTREAM_REPO=${UPSTREAM_REPO}"
            - "UPSTREAM_PR_NUMBER=${UPSTREAM_PR_NUMBER}"
            - "WRITE_DOCS=${WRITE_DOCS:-}"
            - "GITHUB_TOKEN"
            - "ANTHROPIC_BASE_URL=https://agent.buildkite.com/v3/ai/anthropic"
            - "DISABLE_AUTOUPDATER=1"
            - "DISABLE_TELEMETRY=1"
          mount-buildkite-agent: true
